<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <div class="setup-screen setup-screen--hidden" id="setupScreen">
    <div class="setup-card">
      <h1 class="setup-title">Space</h1>
      <p class="setup-subtitle">connect to your GitHub repo</p>
      <div class="setup-field">
        <label class="setup-label" for="setupUser">username</label>
        <input class="setup-input" id="setupUser" type="text" placeholder="mlcodr" autocomplete="off">
      </div>
      <div class="setup-field">
        <label class="setup-label" for="setupRepo">repo name</label>
        <input class="setup-input" id="setupRepo" type="text" placeholder="Space" autocomplete="off">
      </div>
      <div class="setup-field">
        <label class="setup-label" for="setupToken">Personal Access Token</label>
        <input class="setup-input" id="setupToken" type="password" placeholder="ghp_..." autocomplete="off">
        <p class="setup-note">This token stays in your browser only. Never stored on any server.</p>
      </div>
      <button class="setup-btn" id="setupBtn">Save &amp; Continue</button>
      <p class="setup-error" id="setupError" hidden></p>
    </div>
  </div>

  <div class="pin-screen pin-screen--hidden" id="pinScreen">
    <div class="pin-card">
      <h1 class="pin-title">Space</h1>
      <p class="pin-subtitle">enter your PIN</p>
      <input type="password" class="pin-input" id="pinInput" inputmode="numeric" pattern="[0-9]*" placeholder="&#8226;&#8226;&#8226;&#8226;" maxlength="16" autocomplete="off">
      <button class="pin-btn" id="pinBtn">Enter</button>
      <p class="pin-error" id="pinError" hidden></p>
      <p class="pin-warning">There is no way to recover this PIN if forgotten &mdash; write it down somewhere safe.</p>
    </div>
  </div>

  <main id="main" hidden>
    <div class="glow"></div>

    <div class="page" id="page">
      <div class="page-header">
        <time class="timestamp" id="timestamp"></time>
      </div>
      <input class="tag-input" id="tagInput" type="text" placeholder="add a tag (optional)" aria-label="Tag">
      <textarea class="thought-input" id="thoughtInput" placeholder="what's on your mind?" aria-label="Write your thoughts"></textarea>
      <button class="save-btn" id="saveBtn">Save thought</button>
      <div class="save-status" id="saveStatus"></div>
    </div>

    <hr class="divider">

    <div class="controls">
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" class="search-input" id="searchInput" placeholder="search your thoughts">
      </div>
    </div>

    <div class="folder-list" id="folderList"></div>

    <div class="folder-detail" id="folderDetail" hidden></div>

    <div class="entries" id="entries"></div>
  </main>

  <script>
    // ── Theme Toggle ──
    const toggle = document.getElementById('themeToggle');
    const root = document.documentElement;
    const savedTheme = localStorage.getItem('space-theme');
    if (savedTheme) root.setAttribute('data-theme', savedTheme);

    toggle.addEventListener('click', () => {
      const current = root.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      root.setAttribute('data-theme', next);
      localStorage.setItem('space-theme', next);
    });

    // ── Crypto Helpers ──
    function bufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function base64ToBuffer(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes.buffer;
    }

    function generateSalt() {
      return crypto.getRandomValues(new Uint8Array(16));
    }

    // ── Crypto Functions ──
    async function deriveKey(pin, salt) {
      const pinBuffer = new TextEncoder().encode(pin);
      const pinKey = await crypto.subtle.importKey(
        'raw',
        pinBuffer,
        { name: 'PBKDF2' },
        false,
        ['deriveKey']
      );

      return crypto.subtle.deriveKey(
        {
          name: 'PBKDF2',
          salt,
          iterations: 100000,
          hash: 'SHA-256'
        },
        pinKey,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function encryptPayload(data, key) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const plaintext = new TextEncoder().encode(JSON.stringify(data));

      const ciphertext = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        plaintext
      );

      return {
        ciphertext: bufferToBase64(ciphertext),
        iv: bufferToBase64(iv)
      };
    }

    async function decryptPayload(ciphertext, iv, key) {
      try {
        const ciphertextBuffer = base64ToBuffer(ciphertext);
        const ivBuffer = base64ToBuffer(iv);

        const plaintext = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: new Uint8Array(ivBuffer) },
          key,
          ciphertextBuffer
        );

        const decoded = new TextDecoder().decode(plaintext);
        const parsed = JSON.parse(decoded);
        // Backward compat: old format was a bare array
        if (Array.isArray(parsed)) {
          return { thoughts: parsed, folders: [] };
        }
        return parsed;
      } catch (e) {
        return null;
      }
    }

    // ── GitHub API ──
    const CONTENTS_API = 'https://api.github.com/repos';
    const FILE_PATH = 'thoughts.enc.json';

    function getCreds() {
      try {
        return JSON.parse(localStorage.getItem('space-github-creds'));
      } catch {
        return null;
      }
    }

    function saveCreds(user, repo, token) {
      localStorage.setItem('space-github-creds', JSON.stringify({ user, repo, token }));
    }

    async function githubFetch(user, repo, token) {
      const url = `${CONTENTS_API}/${user}/${repo}/contents/${FILE_PATH}?_=${Date.now()}`;
      const res = await fetch(url, {
        cache: 'no-store',
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' }
      });
      if (res.status === 404) return null;
      if (!res.ok) throw new Error(`GitHub fetch failed: ${res.status}`);
      const data = await res.json();
      return {
        sha: data.sha,
        content: JSON.parse(atob(data.content))
      };
    }

    async function githubSave(user, repo, token, payload, sha) {
      const url = `${CONTENTS_API}/${user}/${repo}/contents/${FILE_PATH}`;
      const body = {
        message: `Update thoughts ${new Date().toISOString()}`,
        content: btoa(JSON.stringify(payload))
      };
      if (sha) body.sha = sha;

      let res;
      try {
        res = await fetch(url, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
      } catch (e) {
        const err = new Error('Network error: ' + e.message);
        err.status = 0;
        throw err;
      }
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const e = new Error(err.message || `GitHub save failed: ${res.status}`);
        e.status = res.status;
        throw e;
      }
      return res.json();
    }

    // ── Save Status ──
    const saveStatus = document.getElementById('saveStatus');
    let saveStatusTimer = null;

    function triggerPulse() {
      const page = document.getElementById('page');
      page.classList.remove('page--pulse');
      void page.offsetWidth;
      page.classList.add('page--pulse');
      page.addEventListener('animationend', () => page.classList.remove('page--pulse'), { once: true });
    }

    function showSaveStatus(state, msg) {
      clearTimeout(saveStatusTimer);
      saveStatus.className = 'save-status';
      saveStatus.textContent = '';

      if (state === 'saving') {
        saveStatus.classList.add('save-status--saving');
        saveStatus.textContent = 'saving\u2026';
      } else if (state === 'saved') {
        saveStatus.classList.add('save-status--saved');
        saveStatus.textContent = 'saved';
      } else if (state === 'error') {
        saveStatus.classList.add('save-status--error');
        saveStatus.textContent = msg || 'save failed';
      }
    }

    // ── Setup Screen ──
    const setupScreen = document.getElementById('setupScreen');
    const setupUser = document.getElementById('setupUser');
    const setupRepo = document.getElementById('setupRepo');
    const setupToken = document.getElementById('setupToken');
    const setupBtn = document.getElementById('setupBtn');
    const setupError = document.getElementById('setupError');
    const pinScreen = document.getElementById('pinScreen');

    function hideAllScreens() {
      setupScreen.classList.add('setup-screen--hidden');
      pinScreen.classList.add('pin-screen--hidden');
    }

    function showSetup() {
      setupScreen.classList.remove('setup-screen--hidden');
      pinScreen.classList.add('pin-screen--hidden');
      setupUser.focus();
    }

    function hideSetup() {
      setupScreen.classList.add('setup-screen--hidden');
      pinScreen.classList.remove('pin-screen--hidden');
      pinInput.focus();
    }

    setupBtn.addEventListener('click', async () => {
      const user = setupUser.value.trim();
      const repo = setupRepo.value.trim();
      const token = setupToken.value.trim();

      if (!user || !repo || !token) {
        setupError.textContent = 'All fields are required.';
        setupError.hidden = false;
        return;
      }

      setupBtn.disabled = true;
      setupBtn.textContent = 'Validating\u2026';
      setupError.hidden = true;

      try {
        const res = await fetch(`${CONTENTS_API}/${user}/${repo}`, {
          headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' }
        });
        if (!res.ok) {
          throw new Error(res.status === 401 ? 'Invalid token' : res.status === 404 ? 'Repo not found' : 'Access denied');
        }
        saveCreds(user, repo, token);
        hideSetup();
      } catch (e) {
        setupError.textContent = e.message;
        setupError.hidden = false;
        setupBtn.disabled = false;
        setupBtn.textContent = 'Save & Continue';
      }
    });

    [setupUser, setupRepo, setupToken].forEach(el => {
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') setupBtn.click(); });
    });

    // ── PIN Screen ──
    const pinInput = document.getElementById('pinInput');
    const pinBtn = document.getElementById('pinBtn');
    const pinError = document.getElementById('pinError');
    const mainEl = document.getElementById('main');
    let cryptoKey = null;
    let currentSalt = null;
    let currentSha = null;

    function showPinError(msg) {
      pinError.textContent = msg;
      pinError.hidden = false;
    }

    function hidePinError() {
      pinError.hidden = true;
    }

    async function handlePinSubmit() {
      const pin = pinInput.value.trim();
      if (!pin) return;

      hidePinError();
      pinBtn.disabled = true;
      pinBtn.textContent = 'Unlocking\u2026';

      try {
        const creds = getCreds();
        if (!creds) { showSetup(); return; }

        let remoteData = null;
        try {
          remoteData = await githubFetch(creds.user, creds.repo, creds.token);
        } catch (e) {
          showPinError('Could not reach GitHub: ' + e.message);
          resetPinBtn();
          return;
        }

        if (!remoteData) {
          // First use
          const salt = generateSalt();
          currentSalt = salt;

          cryptoKey = await deriveKey(pin, salt);
          const enc = await encryptPayload({ thoughts: [], folders: [] }, cryptoKey);
          const payload = {
            version: 1,
            updatedAt: Date.now(),
            salt: bufferToBase64(salt),
            iv: enc.iv,
            ciphertext: enc.ciphertext
          };

          let sha = null;
          try {
            const fresh = await githubFetch(creds.user, creds.repo, creds.token);
            if (fresh) sha = fresh.sha;
          } catch { /* new file */ }

          const result = await githubSave(creds.user, creds.repo, creds.token, payload, sha);
          currentSha = result.content.sha;
          thoughts = [];
          folders = [];
          revealJournal();
          return;
        }

        // Existing file
        const storedSalt = base64ToBuffer(remoteData.content.salt);
        currentSalt = new Uint8Array(storedSalt);

        cryptoKey = await deriveKey(pin, currentSalt);
        const decrypted = await decryptPayload(remoteData.content.ciphertext, remoteData.content.iv, cryptoKey);

        if (decrypted === null) {
          showPinError('Incorrect PIN. Try again.');
          resetPinBtn();
          return;
        }

        thoughts = decrypted.thoughts || [];
        folders = decrypted.folders || [];
        currentSha = remoteData.sha;
        revealJournal();
      } catch (e) {
        console.error('[Space] Error:', e);
        showPinError('Something went wrong: ' + e.message);
        resetPinBtn();
      }
    }

    function resetPinBtn() {
      pinBtn.disabled = false;
      pinBtn.textContent = 'Enter';
    }

    function revealJournal() {
      hideAllScreens();
      mainEl.hidden = false;
      setTimestamp();
      currentView = 'list';
      renderFolderList();
      folderDetailEl.hidden = true;
      renderEntries();
    }

    pinBtn.addEventListener('click', handlePinSubmit);
    pinInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handlePinSubmit();
    });

    // ── Init flow ──
    const hasCreds = !!getCreds();
    console.log(hasCreds ? '[Space] Startup: credentials found' : '[Space] Startup: no credentials found');
    if (!hasCreds) {
      showSetup();
    } else {
      pinScreen.classList.remove('pin-screen--hidden');
      setTimeout(() => pinInput.focus(), 100);
    }

    // ── State ──
    let thoughts = [];
    let folders = [];
    let currentView = 'list'; // 'list' or a folder id
    let editingId = null;
    let saving = false;
    let draggedThoughtId = null;

    // ── DOM refs ──
    const page = document.getElementById('page');
    const timestamp = document.getElementById('timestamp');
    const tagInput = document.getElementById('tagInput');
    const thoughtInput = document.getElementById('thoughtInput');
    const saveBtn = document.getElementById('saveBtn');
    const searchInput = document.getElementById('searchInput');
    const entriesEl = document.getElementById('entries');
    const folderListEl = document.getElementById('folderList');
    const folderDetailEl = document.getElementById('folderDetail');

    // ── Helpers ──
    function formatShortDate(ts) {
      const d = new Date(ts);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[d.getMonth()]} ${d.getDate()}`;
    }

    function truncate(str, len) {
      if (str.length <= len) return str;
      return str.slice(0, len).trimEnd() + '\u2026';
    }

    function formatTimeShort(ts) {
      return new Date(ts).toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).toLowerCase().replace(' ', '');
    }

    function setTimestamp() {
      const now = new Date();
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      timestamp.textContent = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
      timestamp.setAttribute('datetime', now.toISOString().slice(0, 10));
    }

    function getFolderName(id) {
      if (!id) return null;
      const f = folders.find(x => x.id === id);
      return f ? f.name : null;
    }

    function getCurrentFolder() {
      if (currentView === 'list') return null;
      return folders.find(f => f.id === currentView) || null;
    }

    // ── Navigation ──
    function navigateToFolder(folderId) {
      currentView = folderId;
      renderFolderList();
      renderFolderDetail();
      renderEntries();
      entriesEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function navigateBack() {
      currentView = 'list';
      renderFolderList();
      folderDetailEl.hidden = true;
      renderEntries();
    }

    // ── Folder List (VIEW 1) ──
    function renderFolderList() {
      folderListEl.innerHTML = '';
      folderListEl.hidden = (currentView !== 'list');

      if (currentView !== 'list') return;

      // "All thoughts" row
      const allRow = document.createElement('button');
      allRow.className = 'folder-row';
      const allName = document.createElement('span');
      allName.className = 'folder-row-name';
      allName.textContent = 'All thoughts';
      const allCount = document.createElement('span');
      allCount.className = 'folder-row-count';
      allCount.textContent = thoughts.length;
      const allChevron = document.createElement('span');
      allChevron.className = 'folder-row-chevron';
      allChevron.textContent = '\u203a';
      allRow.appendChild(allName);
      allRow.appendChild(allCount);
      allRow.appendChild(allChevron);
      allRow.addEventListener('click', () => {
        currentView = 'list';
        renderEntries();
        folderListEl.querySelectorAll('.folder-row').forEach(r => r.classList.remove('folder-row--active'));
        allRow.classList.add('folder-row--active');
      });
      // Drop target for unfiled
      allRow.addEventListener('dragover', (e) => { e.preventDefault(); allRow.classList.add('folder-row--drag-over'); });
      allRow.addEventListener('dragleave', () => allRow.classList.remove('folder-row--drag-over'));
      allRow.addEventListener('drop', (e) => {
        e.preventDefault();
        allRow.classList.remove('folder-row--drag-over');
        const thoughtId = e.dataTransfer.getData('text/plain');
        if (thoughtId) moveThoughtToFolder(thoughtId, null);
      });
      folderListEl.appendChild(allRow);

      // Folder rows
      folders.forEach(folder => {
        const count = thoughts.filter(t => t.folderId === folder.id).length;
        const row = document.createElement('button');
        row.className = 'folder-row';
        row.dataset.folderId = folder.id;
        const nameSpan = document.createElement('span');
        nameSpan.className = 'folder-row-name';
        nameSpan.textContent = folder.name;
        const countSpan = document.createElement('span');
        countSpan.className = 'folder-row-count';
        countSpan.textContent = count;
        const chevron = document.createElement('span');
        chevron.className = 'folder-row-chevron';
        chevron.textContent = '\u203a';
        row.appendChild(nameSpan);
        row.appendChild(countSpan);
        row.appendChild(chevron);
        row.addEventListener('click', () => navigateToFolder(folder.id));
        // Drop target
        row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('folder-row--drag-over'); });
        row.addEventListener('dragleave', () => row.classList.remove('folder-row--drag-over'));
        row.addEventListener('drop', (e) => {
          e.preventDefault();
          row.classList.remove('folder-row--drag-over');
          const thoughtId = e.dataTransfer.getData('text/plain');
          if (thoughtId) moveThoughtToFolder(thoughtId, folder.id);
        });
        folderListEl.appendChild(row);
      });

      // "+ New folder" row
      const addRow = document.createElement('button');
      addRow.className = 'folder-add-row';
      addRow.textContent = '+ New folder';
      const addInput = document.createElement('input');
      addInput.type = 'text';
      addInput.className = 'folder-add-input';
      addInput.placeholder = 'folder name';
      addInput.maxLength = 30;
      addInput.hidden = true;
      addRow.addEventListener('click', () => {
        addRow.hidden = true;
        addInput.hidden = false;
        addInput.value = '';
        addInput.focus();
      });
      addInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const name = addInput.value.trim();
          if (name) {
            createFolder(name);
            addInput.hidden = true;
            addRow.hidden = false;
          }
        } else if (e.key === 'Escape') {
          addInput.hidden = true;
          addRow.hidden = false;
        }
      });
      addInput.addEventListener('blur', () => {
        addInput.hidden = true;
        addRow.hidden = false;
      });
      folderListEl.appendChild(addRow);
      folderListEl.appendChild(addInput);
    }

    // ── Folder Detail (VIEW 2) ──
    function renderFolderDetail() {
      const folder = getCurrentFolder();
      if (!folder) {
        folderDetailEl.hidden = true;
        return;
      }
      folderDetailEl.hidden = false;
      folderDetailEl.innerHTML = '';

      const header = document.createElement('div');
      header.className = 'folder-detail-header';

      // Back button
      const backBtn = document.createElement('button');
      backBtn.className = 'folder-back-btn';
      backBtn.textContent = '\u2190 Back';
      backBtn.addEventListener('click', navigateBack);
      header.appendChild(backBtn);

      // Folder name (or rename input)
      const nameEl = document.createElement('span');
      nameEl.className = 'folder-detail-name';
      nameEl.textContent = folder.name;
      header.appendChild(nameEl);

      // Action buttons
      const actions = document.createElement('div');
      actions.className = 'folder-detail-actions';

      const renameBtn = document.createElement('button');
      renameBtn.className = 'folder-detail-btn';
      renameBtn.textContent = 'Rename';
      renameBtn.addEventListener('click', () => startDetailRename(folder, header));
      actions.appendChild(renameBtn);

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'folder-detail-btn folder-detail-btn--danger';
      deleteBtn.textContent = 'Delete';
      deleteBtn.addEventListener('click', () => confirmDetailDelete(folder, header));
      actions.appendChild(deleteBtn);

      header.appendChild(actions);
      folderDetailEl.appendChild(header);
    }

    function startDetailRename(folder, header) {
      const nameEl = header.querySelector('.folder-detail-name');
      const actions = header.querySelector('.folder-detail-actions');
      const currentName = folder.name;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'folder-detail-rename';
      input.value = currentName;
      input.maxLength = 30;

      let saved = false;
      const save = async () => {
        if (saved) return;
        const newName = input.value.trim();
        if (newName && newName !== currentName) {
          saved = true;
          folder.name = newName;
          renderFolderDetail();
          renderFolderList();
          const ok = await persistToGitHub();
          if (!ok) {
            folder.name = currentName;
            renderFolderDetail();
            renderFolderList();
          }
        } else {
          renderFolderDetail();
        }
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        else if (e.key === 'Escape') { saved = true; renderFolderDetail(); }
      });
      input.addEventListener('blur', save);

      nameEl.replaceWith(input);
      actions.hidden = true;
      input.focus();
      input.select();
    }

    function confirmDetailDelete(folder, header) {
      const actions = header.querySelector('.folder-detail-actions');
      actions.hidden = true;

      const confirm = document.createElement('div');
      confirm.className = 'folder-detail-delete-confirm';
      confirm.innerHTML = '<span>delete this folder?</span>';
      const yesBtn = document.createElement('button');
      yesBtn.className = 'confirm-yes';
      yesBtn.textContent = 'yes';
      yesBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteFolder(folder);
      });
      const noBtn = document.createElement('button');
      noBtn.className = 'confirm-no';
      noBtn.textContent = 'no';
      noBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        renderFolderDetail();
      });
      confirm.appendChild(yesBtn);
      confirm.appendChild(noBtn);
      header.appendChild(confirm);
    }

    // ── Folder CRUD ──
    async function createFolder(name) {
      const folder = { id: crypto.randomUUID(), name, createdAt: Date.now() };
      folders.push(folder);
      console.log('[Space] Folder created:', name, folder.id);
      renderFolderList();
      await persistToGitHub();
    }

    async function deleteFolder(folder) {
      thoughts.forEach(t => { if (t.folderId === folder.id) t.folderId = null; });
      folders = folders.filter(f => f.id !== folder.id);
      console.log('[Space] Folder deleted:', folder.name);
      currentView = 'list';
      renderFolderList();
      folderDetailEl.hidden = true;
      renderEntries();
      await persistToGitHub();
    }

    async function moveThoughtToFolder(thoughtId, folderId) {
      const t = thoughts.find(x => x.id === thoughtId);
      if (!t) return;
      t.folderId = folderId;
      t.updatedAt = Date.now();
      const folderName = getFolderName(folderId);
      console.log('[Space] Moved thought', thoughtId, 'to', folderName || '(unfiled)');
      renderFolderList();
      renderEntries();
      await persistToGitHub();
    }

    // ── Persist to GitHub ──
    async function persistToGitHub() {
      const creds = getCreds();
      if (!creds) { showSaveStatus('error', 'missing credentials'); return false; }
      if (!cryptoKey) { showSaveStatus('error', 'not unlocked'); return false; }
      if (!currentSalt) { showSaveStatus('error', 'no encryption key'); return false; }
      if (saving) return false;

      saving = true;
      saveBtn.disabled = true;
      showSaveStatus('saving');

      try {
        const enc = await encryptPayload({ thoughts, folders }, cryptoKey);
        const payload = {
          version: 1,
          updatedAt: Date.now(),
          salt: bufferToBase64(currentSalt),
          iv: enc.iv,
          ciphertext: enc.ciphertext
        };

        let sha = currentSha;
        try {
          const fresh = await githubFetch(creds.user, creds.repo, creds.token);
          if (fresh) {
            sha = fresh.sha;
            console.log('[Space] Attempt 1 SHA:', sha);
          }
        } catch (e) {
          console.warn('[Space] Could not fetch fresh SHA, using cached:', currentSha);
        }

        let result = null;
        for (let attempt = 1; attempt <= 3; attempt++) {
          try {
            console.log('[Space] PUT attempt', attempt, 'with SHA:', sha);
            result = await githubSave(creds.user, creds.repo, creds.token, payload, sha);
            console.log('[Space] Attempt', attempt, 'succeeded');
            break;
          } catch (e) {
            if ((e.status === 409 || e.status === 422) && attempt < 3) {
              console.warn('[Space] SHA conflict on attempt', attempt, ', retrying...');
              await new Promise(r => setTimeout(r, 300));
              try {
                const fresh = await githubFetch(creds.user, creds.repo, creds.token);
                sha = fresh ? fresh.sha : null;
                console.log('[Space] Retry SHA:', sha);
              } catch { /* keep same SHA */ }
            } else {
              console.error('[Space] Save failed:', e);
              showSaveStatus('error', e.status ? 'save failed (HTTP ' + e.status + ')' : 'check your connection');
              return false;
            }
          }
        }

        currentSha = result.content.sha;
        console.log('[Space] Save successful, new SHA:', currentSha);
        showSaveStatus('saved');
        return true;
      } catch (e) {
        console.error('[Space] Unexpected error:', e);
        showSaveStatus('error', 'save failed: ' + e.message);
        return false;
      } finally {
        saving = false;
        saveBtn.disabled = false;
      }
    }

    // ── Render Entries ──
    function renderEntries() {
      entriesEl.innerHTML = '';

      const filtered = thoughts.filter(t => {
        if (currentView !== 'list' && t.folderId !== currentView) return false;
        return true;
      });

      if (filtered.length === 0 && thoughts.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<p>nothing here yet \u2014 your first thought will start the list.</p>';
        entriesEl.appendChild(empty);
        return;
      }

      if (filtered.length === 0 && currentView !== 'list') {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<p>no thoughts in this folder yet.</p>';
        entriesEl.appendChild(empty);
        return;
      }

      const sorted = [...filtered].sort((a, b) => b.createdAt - a.createdAt);

      sorted.forEach(t => {
        const article = createEntryElement(t);
        entriesEl.appendChild(article);
      });

      applyFilter();
    }

    function createEntryElement(t) {
      const article = document.createElement('article');
      article.className = 'entry';
      article.dataset.id = t.id;
      article.draggable = true;

      // Drag handlers
      article.addEventListener('dragstart', (e) => {
        draggedThoughtId = t.id;
        article.classList.add('entry--dragging');
        e.dataTransfer.setData('text/plain', t.id);
        e.dataTransfer.effectAllowed = 'move';
      });
      article.addEventListener('dragend', () => {
        article.classList.remove('entry--dragging');
        draggedThoughtId = null;
        document.querySelectorAll('.folder-item--drag-over').forEach(el => el.classList.remove('folder-item--drag-over'));
      });

      const row = document.createElement('div');
      row.className = 'entry-row';
      row.setAttribute('role', 'button');
      row.setAttribute('tabindex', '0');

      const dateEl = document.createElement('time');
      dateEl.className = 'entry-date';
      dateEl.setAttribute('datetime', new Date(t.createdAt).toISOString());
      dateEl.textContent = formatShortDate(t.createdAt) + ' \u00b7 ' + formatTimeShort(t.createdAt);

      const excerpt = document.createElement('p');
      excerpt.className = 'entry-excerpt';
      excerpt.textContent = truncate(t.body, 80);

      row.appendChild(dateEl);
      if (t.tag) {
        const tagEl = document.createElement('span');
        tagEl.className = 'entry-tag';
        tagEl.textContent = t.tag;
        row.appendChild(tagEl);
      }
      if (t.folderId) {
        const folderName = getFolderName(t.folderId);
        if (folderName) {
          const folderEl = document.createElement('span');
          folderEl.className = 'entry-folder';
          folderEl.textContent = folderName;
          row.appendChild(folderEl);
        }
      }
      row.appendChild(excerpt);

      const content = document.createElement('div');
      content.className = 'entry-content';

      const body = document.createElement('p');
      body.className = 'entry-body';
      body.textContent = t.body;
      content.appendChild(body);

      const actions = document.createElement('div');
      actions.className = 'entry-actions';

      const editBtn = document.createElement('button');
      editBtn.className = 'entry-action-btn';
      editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        startEdit(t.id);
      });

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'entry-action-btn entry-action-btn--danger';
      deleteBtn.textContent = 'Delete';
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showDeleteConfirm(actions);
      });

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);

      // "Move to..." dropdown
      const moveWrapper = document.createElement('div');
      moveWrapper.className = 'entry-move-wrapper';
      const moveSelect = document.createElement('select');
      moveSelect.className = 'entry-move-select';
      const unfiledOpt = document.createElement('option');
      unfiledOpt.value = '';
      unfiledOpt.textContent = 'Move to...';
      moveSelect.appendChild(unfiledOpt);
      const noneOpt = document.createElement('option');
      noneOpt.value = '__unfiled__';
      noneOpt.textContent = 'Unfiled';
      moveSelect.appendChild(noneOpt);
      folders.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.id;
        opt.textContent = f.name;
        if (t.folderId === f.id) opt.selected = true;
        moveSelect.appendChild(opt);
      });
      moveSelect.addEventListener('change', (e) => {
        e.stopPropagation();
        const val = moveSelect.value;
        if (val === '') return;
        moveThoughtToFolder(t.id, val === '__unfiled__' ? null : val);
      });
      moveSelect.addEventListener('click', (e) => e.stopPropagation());
      moveWrapper.appendChild(moveSelect);
      actions.appendChild(moveWrapper);

      content.appendChild(actions);

      const confirm = document.createElement('div');
      confirm.className = 'entry-delete-confirm';
      confirm.hidden = true;
      confirm.innerHTML = '<span>are you sure?</span>';
      const yesBtn = document.createElement('button');
      yesBtn.className = 'confirm-yes';
      yesBtn.textContent = 'yes';
      yesBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteThought(t.id);
      });
      const noBtn = document.createElement('button');
      noBtn.className = 'confirm-no';
      noBtn.textContent = 'no';
      noBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        hideDeleteConfirm(actions, confirm);
      });
      confirm.appendChild(yesBtn);
      confirm.appendChild(noBtn);
      content.appendChild(confirm);

      article.appendChild(row);
      article.appendChild(content);

      row.addEventListener('click', () => toggleExpand(article));
      row.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggleExpand(article);
        }
      });

      return article;
    }

    // ── Filter ──
    function applyFilter() {
      const query = searchInput.value.toLowerCase().trim();
      const entries = entriesEl.querySelectorAll('.entry');
      let visibleCount = 0;

      entries.forEach(article => {
        const id = article.dataset.id;
        const t = thoughts.find(x => x.id === id);
        if (!t) return;

        const matches = !query ||
          t.body.toLowerCase().includes(query) ||
          (t.tag && t.tag.toLowerCase().includes(query));

        if (matches) {
          article.classList.remove('entry--hidden');
          visibleCount++;
        } else {
          article.classList.add('entry--hidden');
        }
      });

      const existingEmpty = entriesEl.querySelector('.empty-state');
      if (visibleCount === 0 && thoughts.length > 0) {
        if (!existingEmpty) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.innerHTML = '<p>no matching thoughts found.</p>';
          entriesEl.appendChild(empty);
        }
      } else if (existingEmpty && thoughts.length > 0) {
        existingEmpty.remove();
      }
    }

    // ── Expand / Collapse ──
    function toggleExpand(article) {
      const wasExpanded = article.classList.contains('entry--expanded');
      document.querySelectorAll('.entry--expanded').forEach(el => el.classList.remove('entry--expanded'));
      if (!wasExpanded) article.classList.add('entry--expanded');
    }

    // ── Edit ──
    function startEdit(id) {
      const t = thoughts.find(x => x.id === id);
      if (!t) return;
      editingId = id;
      thoughtInput.value = t.body;
      tagInput.value = t.tag || '';
      saveBtn.textContent = 'Update thought';
      thoughtInput.focus();
      page.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── Delete ──
    function showDeleteConfirm(actionsEl) {
      actionsEl.hidden = true;
      actionsEl.nextElementSibling.hidden = false;
    }

    function hideDeleteConfirm(actionsEl, confirmEl) {
      confirmEl.hidden = true;
      actionsEl.hidden = false;
    }

    async function deleteThought(id) {
      thoughts = thoughts.filter(t => t.id !== id);
      editingId = null;
      saveBtn.textContent = 'Save thought';
      renderFolderList();
      renderEntries();
      await persistToGitHub();
    }

    // ── Save / Update ──
    saveBtn.addEventListener('click', async () => {
      const body = thoughtInput.value.trim();
      if (!body) return;

      const tag = tagInput.value.trim() || null;

      if (editingId) {
        const t = thoughts.find(x => x.id === editingId);
        if (!t) return;
        const prevBody = t.body;
        const prevTag = t.tag;
        t.body = body;
        t.tag = tag;
        t.updatedAt = Date.now();
        editingId = null;
        saveBtn.textContent = 'Save thought';
        renderFolderList();
        renderEntries();
        const ok = await persistToGitHub();
        if (ok) {
          thoughtInput.value = '';
          tagInput.value = '';
          triggerPulse();
        } else {
          t.body = prevBody;
          t.tag = prevTag;
          editingId = t.id;
          saveBtn.textContent = 'Update thought';
          renderEntries();
        }
      } else {
        const newThought = {
          id: crypto.randomUUID(),
          createdAt: Date.now(),
          updatedAt: Date.now(),
          tag,
          body,
          folderId: currentView !== 'list' ? currentView : null
        };
        thoughts.push(newThought);
        renderFolderList();
        renderEntries();
        const ok = await persistToGitHub();
        if (ok) {
          thoughtInput.value = '';
          tagInput.value = '';
          triggerPulse();
        } else {
          thoughts = thoughts.filter(x => x.id !== newThought.id);
          renderEntries();
        }
      }
    });

    // ── Search ──
    searchInput.addEventListener('input', () => applyFilter());
  </script>
</body>
</html>
