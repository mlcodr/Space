<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space</title>
  <meta name="theme-color" content="#1B1D23" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#EDE9DF" media="(prefers-color-scheme: light)">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="setup-screen setup-screen--hidden" id="setupScreen">
    <div class="setup-card">
      <h1 class="setup-title">Space</h1>
      <p class="setup-subtitle">connect to your GitHub repo</p>
      <div class="setup-field">
        <label class="setup-label" for="setupUser">username</label>
        <input class="setup-input" id="setupUser" type="text" placeholder="mlcodr" autocomplete="off">
      </div>
      <div class="setup-field">
        <label class="setup-label" for="setupRepo">repo name</label>
        <input class="setup-input" id="setupRepo" type="text" placeholder="Space" autocomplete="off">
      </div>
      <div class="setup-field">
        <label class="setup-label" for="setupToken">Personal Access Token</label>
        <input class="setup-input" id="setupToken" type="password" placeholder="ghp_..." autocomplete="off">
        <p class="setup-note">This token stays in your browser only. Never stored on any server.</p>
      </div>
      <button class="setup-btn" id="setupBtn">Save &amp; Continue</button>
      <p class="setup-error" id="setupError" hidden></p>
    </div>
  </div>

  <div class="pin-screen pin-screen--hidden" id="pinScreen">
    <div class="pin-card">
      <h1 class="pin-title">Space</h1>
      <p class="pin-subtitle">enter your PIN</p>
      <input type="password" class="pin-input" id="pinInput" inputmode="numeric" pattern="[0-9]*" placeholder="&#8226;&#8226;&#8226;&#8226;" maxlength="16" autocomplete="off">
      <button class="pin-btn" id="pinBtn">Enter</button>
      <p class="pin-error" id="pinError" hidden></p>
      <p class="pin-warning">There is no way to recover this PIN if forgotten &mdash; write it down somewhere safe.</p>
    </div>
  </div>

  <main id="main" hidden>
    <div class="glow"></div>

<div class="page" id="page">
        <div class="page-header">
          <time class="timestamp" id="timestamp"></time>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
        <input class="tag-input" id="tagInput" type="text" placeholder="add a tag (optional)" aria-label="Tag">
        <textarea class="thought-input" id="thoughtInput" placeholder="what's on your mind?" aria-label="Write your thoughts"></textarea>
        <div class="page-readonly" id="pageReadonly" hidden>
          <div class="page-readonly-body" id="pageReadonlyBody"></div>
          <div class="page-readonly-footer" id="pageReadonlyFooter">
            <button class="readonly-copy-btn" id="readonlyCopyBtn" aria-label="Copy thought text">
              <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            <span class="readonly-word-count" id="readonlyWordCount">0 words</span>
          </div>
        </div>
        <div class="page-save-group" id="pageSaveGroup">
          <div class="page-save-buttons">
            <button class="save-btn" id="saveBtn">Save thought</button>
            <button class="cancel-btn" id="cancelBtn" hidden>Cancel</button>
          </div>
          <span class="editor-word-count" id="editorWordCount">0 words</span>
        </div>
        <div class="save-status" id="saveStatus"></div>
        <div class="sync-status" id="syncStatus" hidden></div>
      </div>

    <hr class="divider">

    <div class="split-layout">
      <div class="folder-panel" id="folderPanel">
        <button class="folder-toggle-btn" id="folderToggleBtn">
          <span class="folder-toggle-left">
            <svg class="folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            <span class="folder-toggle-text">Folders</span>
          </span>
          <svg class="folder-toggle-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="folder-list" id="folderList"></div>
      </div>

      <div class="controls">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="search your thoughts">
        </div>
      </div>

      <div class="entries-panel" id="entriesPanel">
        <div class="entries" id="entries"></div>
      </div>
    </div>
  </main>

  <script>
    // ── Theme Toggle ──
    const toggle = document.getElementById('themeToggle');
    const root = document.documentElement;
    const savedTheme = localStorage.getItem('space-theme');
    if (savedTheme) root.setAttribute('data-theme', savedTheme);

    toggle.addEventListener('click', () => {
      const current = root.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      root.setAttribute('data-theme', next);
      localStorage.setItem('space-theme', next);
    });

    // ── Crypto Helpers ──
    function bufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function base64ToBuffer(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes.buffer;
    }

    function generateSalt() {
      return crypto.getRandomValues(new Uint8Array(16));
    }

    // ── Crypto Functions ──
    async function deriveKey(pin, salt) {
      const pinBuffer = new TextEncoder().encode(pin);
      const pinKey = await crypto.subtle.importKey(
        'raw',
        pinBuffer,
        { name: 'PBKDF2' },
        false,
        ['deriveKey']
      );

      return crypto.subtle.deriveKey(
        {
          name: 'PBKDF2',
          salt,
          iterations: 100000,
          hash: 'SHA-256'
        },
        pinKey,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function encryptPayload(data, key) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const plaintext = new TextEncoder().encode(JSON.stringify(data));

      const ciphertext = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        plaintext
      );

      return {
        ciphertext: bufferToBase64(ciphertext),
        iv: bufferToBase64(iv)
      };
    }

    async function decryptPayload(ciphertext, iv, key) {
      try {
        const ciphertextBuffer = base64ToBuffer(ciphertext);
        const ivBuffer = base64ToBuffer(iv);

        const plaintext = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv: new Uint8Array(ivBuffer) },
          key,
          ciphertextBuffer
        );

        const decoded = new TextDecoder().decode(plaintext);
        const parsed = JSON.parse(decoded);
        // Backward compat: old format was a bare array
        if (Array.isArray(parsed)) {
          return { thoughts: parsed, folders: [] };
        }
        return parsed;
      } catch (e) {
        return null;
      }
    }

    // ── GitHub API ──
    const CONTENTS_API = 'https://api.github.com/repos';
    const FILE_PATH = 'thoughts.enc.json';

    function getCreds() {
      try {
        return JSON.parse(localStorage.getItem('space-github-creds'));
      } catch {
        return null;
      }
    }

    function saveCreds(user, repo, token) {
      localStorage.setItem('space-github-creds', JSON.stringify({ user, repo, token }));
    }

    async function githubFetch(user, repo, token) {
      const url = `${CONTENTS_API}/${user}/${repo}/contents/${FILE_PATH}?_=${Date.now()}`;
      const res = await fetch(url, {
        cache: 'no-store',
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' }
      });
      if (res.status === 404) return null;
      if (!res.ok) throw new Error(`GitHub fetch failed: ${res.status}`);
      const data = await res.json();
      return {
        sha: data.sha,
        content: JSON.parse(atob(data.content))
      };
    }

    async function githubSave(user, repo, token, payload, sha) {
      const url = `${CONTENTS_API}/${user}/${repo}/contents/${FILE_PATH}`;
      const body = {
        message: `Update thoughts ${new Date().toISOString()}`,
        content: btoa(JSON.stringify(payload))
      };
      if (sha) body.sha = sha;

      let res;
      try {
        res = await fetch(url, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
      } catch (e) {
        const err = new Error('Network error: ' + e.message);
        err.status = 0;
        throw err;
      }
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const e = new Error(err.message || `GitHub save failed: ${res.status}`);
        e.status = res.status;
        throw e;
      }
      return res.json();
    }

    // ── Save Status ──
    const saveStatus = document.getElementById('saveStatus');
    const syncStatusEl = document.getElementById('syncStatus');
    let saveStatusTimer = null;

    function triggerPulse() {
      const page = document.getElementById('page');
      page.classList.remove('page--pulse');
      void page.offsetWidth;
      page.classList.add('page--pulse');
      page.addEventListener('animationend', () => page.classList.remove('page--pulse'), { once: true });
    }

    function showSaveStatus(state, msg) {
      clearTimeout(saveStatusTimer);
      saveStatus.className = 'save-status';
      saveStatus.textContent = '';

      if (state === 'saving') {
        saveStatus.classList.add('save-status--saving');
        saveStatus.textContent = 'saving\u2026';
      } else if (state === 'saved') {
        saveStatus.classList.add('save-status--saved');
        saveStatus.textContent = 'saved';
      } else if (state === 'error') {
        saveStatus.classList.add('save-status--error');
        saveStatus.textContent = msg || 'save failed';
      }
    }

    // ── Encrypted Local Storage ──
    async function saveEncryptedLocally() {
      if (!cryptoKey) return;
      try {
        const enc = await encryptPayload({ thoughts, folders }, cryptoKey);
        const blob = {
          version: 1,
          updatedAt: Date.now(),
          salt: bufferToBase64(currentSalt),
          iv: enc.iv,
          ciphertext: enc.ciphertext
        };
        localStorage.setItem('space-local-encrypted', JSON.stringify(blob));
      } catch (e) {
        console.warn('[Space] Could not save encrypted blob locally:', e);
      }
    }

    function loadEncryptedFromLocal() {
      try {
        const raw = localStorage.getItem('space-local-encrypted');
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) {
        return null;
      }
    }

    // ── Pending Sync (boolean: local blob newer than GitHub) ──
    function getPendingSync() {
      return localStorage.getItem('space-pending-sync') === 'true';
    }

    function setPendingSync(pending) {
      localStorage.setItem('space-pending-sync', String(pending));
      updatePendingStatus();
    }

    function updatePendingStatus() {
      const pending = getPendingSync();
      if (!pending) {
        syncStatusEl.hidden = true;
        syncStatusEl.textContent = '';
        syncStatusEl.className = 'sync-status';
        return;
      }
      syncStatusEl.hidden = false;
      if (syncing) {
        syncStatusEl.textContent = 'syncing\u2026';
        syncStatusEl.className = 'sync-status sync-status--syncing';
      } else {
        syncStatusEl.textContent = 'changes waiting to sync';
        syncStatusEl.className = 'sync-status sync-status--pending';
      }
    }

    let syncing = false;

    // ── Background GitHub Sync ──
    async function syncToGitHub() {
      if (syncing) return;
      const creds = getCreds();
      if (!creds || !cryptoKey || !currentSalt) return;
      if (!getPendingSync()) return;

      syncing = true;
      updatePendingStatus();

      try {
        const enc = await encryptPayload({ thoughts, folders }, cryptoKey);
        const payload = {
          version: 1,
          updatedAt: Date.now(),
          salt: bufferToBase64(currentSalt),
          iv: enc.iv,
          ciphertext: enc.ciphertext
        };

        let sha = currentSha;
        try {
          const fresh = await githubFetch(creds.user, creds.repo, creds.token);
          if (fresh) sha = fresh.sha;
        } catch { /* use cached SHA */ }

        let result = null;
        for (let attempt = 1; attempt <= 3; attempt++) {
          try {
            result = await githubSave(creds.user, creds.repo, creds.token, payload, sha);
            break;
          } catch (e) {
            if ((e.status === 409 || e.status === 422) && attempt < 3) {
              await new Promise(r => setTimeout(r, 300));
              try {
                const fresh = await githubFetch(creds.user, creds.repo, creds.token);
                sha = fresh ? fresh.sha : null;
              } catch { /* keep same SHA */ }
            } else {
              console.warn('[Space] Sync failed:', e);
              syncing = false;
              updatePendingStatus();
              return;
            }
          }
        }

        currentSha = result.content.sha;
        setPendingSync(false);
        console.log('[Space] Sync successful');
      } catch (e) {
        console.warn('[Space] Sync error:', e);
      } finally {
        syncing = false;
        updatePendingStatus();
      }
    }

    // ── Setup Screen ──
    const setupScreen = document.getElementById('setupScreen');
    const setupUser = document.getElementById('setupUser');
    const setupRepo = document.getElementById('setupRepo');
    const setupToken = document.getElementById('setupToken');
    const setupBtn = document.getElementById('setupBtn');
    const setupError = document.getElementById('setupError');
    const pinScreen = document.getElementById('pinScreen');

    function hideAllScreens() {
      setupScreen.classList.add('setup-screen--hidden');
      pinScreen.classList.add('pin-screen--hidden');
    }

    function showSetup() {
      setupScreen.classList.remove('setup-screen--hidden');
      pinScreen.classList.add('pin-screen--hidden');
      setupUser.focus();
    }

    function hideSetup() {
      setupScreen.classList.add('setup-screen--hidden');
      pinScreen.classList.remove('pin-screen--hidden');
      pinInput.focus();
    }

    setupBtn.addEventListener('click', async () => {
      const user = setupUser.value.trim();
      const repo = setupRepo.value.trim();
      const token = setupToken.value.trim();

      if (!user || !repo || !token) {
        setupError.textContent = 'All fields are required.';
        setupError.hidden = false;
        return;
      }

      setupBtn.disabled = true;
      setupBtn.textContent = 'Validating\u2026';
      setupError.hidden = true;

      try {
        const res = await fetch(`${CONTENTS_API}/${user}/${repo}`, {
          headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' }
        });
        if (!res.ok) {
          throw new Error(res.status === 401 ? 'Invalid token' : res.status === 404 ? 'Repo not found' : 'Access denied');
        }
        saveCreds(user, repo, token);
        hideSetup();
      } catch (e) {
        setupError.textContent = e.message;
        setupError.hidden = false;
        setupBtn.disabled = false;
        setupBtn.textContent = 'Save & Continue';
      }
    });

    [setupUser, setupRepo, setupToken].forEach(el => {
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') setupBtn.click(); });
    });

    // ── PIN Screen ──
    const pinInput = document.getElementById('pinInput');
    const pinBtn = document.getElementById('pinBtn');
    const pinError = document.getElementById('pinError');
    const mainEl = document.getElementById('main');
    let cryptoKey = null;
    let currentSalt = null;
    let currentSha = null;

    function showPinError(msg) {
      pinError.textContent = msg;
      pinError.hidden = false;
    }

    function hidePinError() {
      pinError.hidden = true;
    }

    async function handlePinSubmit() {
      const pin = pinInput.value.trim();
      if (!pin) return;

      hidePinError();
      pinBtn.disabled = true;
      pinBtn.textContent = 'Unlocking\u2026';

      try {
        const creds = getCreds();
        if (!creds) { showSetup(); return; }

        // Step 1: Try GitHub
        let remoteData = null;
        try {
          remoteData = await githubFetch(creds.user, creds.repo, creds.token);
        } catch (e) {
          // Offline — will try local encrypted blob below
        }

        if (remoteData) {
          // Got from GitHub — decrypt
          const salt = base64ToBuffer(remoteData.content.salt);
          currentSalt = new Uint8Array(salt);
          cryptoKey = await deriveKey(pin, currentSalt);
          const decrypted = await decryptPayload(remoteData.content.ciphertext, remoteData.content.iv, cryptoKey);

          if (decrypted === null) {
            showPinError('Incorrect PIN. Try again.');
            resetPinBtn();
            return;
          }

          thoughts = decrypted.thoughts || [];
          folders = decrypted.folders || [];
          currentSha = remoteData.sha;

          // Save encrypted blob locally for offline use
          await saveEncryptedLocally();
          setPendingSync(false);
          revealJournal();
          return;
        }

        // Step 2: No GitHub data — try local encrypted blob
        const localBlob = loadEncryptedFromLocal();
        if (localBlob) {
          const salt = base64ToBuffer(localBlob.salt);
          currentSalt = new Uint8Array(salt);
          cryptoKey = await deriveKey(pin, currentSalt);
          const decrypted = await decryptPayload(localBlob.ciphertext, localBlob.iv, cryptoKey);

          if (decrypted === null) {
            showPinError('Incorrect PIN. Try again.');
            resetPinBtn();
            return;
          }

          thoughts = decrypted.thoughts || [];
          folders = decrypted.folders || [];
          currentSha = null; // No GitHub SHA yet
          setPendingSync(true); // Local is newer
          revealJournal();
          // Try to create GitHub file in background
          syncToGitHub();
          return;
        }

        // Step 3: First use — create new journal
        const salt = generateSalt();
        currentSalt = salt;
        cryptoKey = await deriveKey(pin, salt);
        thoughts = [];
        folders = [];
        currentSha = null;

        await saveEncryptedLocally();
        setPendingSync(true);
        revealJournal();

        // Create GitHub file in background
        syncToGitHub();
      } catch (e) {
        console.error('[Space] Error:', e);
        showPinError('Something went wrong: ' + e.message);
        resetPinBtn();
      }
    }

    function resetPinBtn() {
      pinBtn.disabled = false;
      pinBtn.textContent = 'Enter';
    }

    function revealJournal() {
      hideAllScreens();
      mainEl.hidden = false;
      setTimestamp();
      currentView = 'list';
      renderFolderList();
      renderEntries();
      updatePendingStatus();
    }

    pinBtn.addEventListener('click', handlePinSubmit);
    pinInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handlePinSubmit();
    });

    // ── Init flow ──
    const hasCreds = !!getCreds();
    console.log(hasCreds ? '[Space] Startup: credentials found' : '[Space] Startup: no credentials found');
    if (!hasCreds) {
      showSetup();
    } else {
      pinScreen.classList.remove('pin-screen--hidden');
      setTimeout(() => pinInput.focus(), 100);
    }

    // ── State ──
    let thoughts = [];
    let folders = [];
    let currentView = 'list'; // 'list' or a folder id
    let editingId = null;
    let saving = false;
    let draggedThoughtId = null;

    // ── DOM refs ──
    const page = document.getElementById('page');
    const timestamp = document.getElementById('timestamp');
    const tagInput = document.getElementById('tagInput');
    const thoughtInput = document.getElementById('thoughtInput');
    const saveBtn = document.getElementById('saveBtn');
    const pageSaveGroup = document.getElementById('pageSaveGroup');
    const cancelBtn = document.getElementById('cancelBtn');
    const searchInput = document.getElementById('searchInput');
    const entriesEl = document.getElementById('entries');
    const folderListEl = document.getElementById('folderList');
    const pageReadonly = document.getElementById('pageReadonly');
    const pageReadonlyBody = document.getElementById('pageReadonlyBody');
    const editorWordCount = document.getElementById('editorWordCount');
    const readonlyWordCount = document.getElementById('readonlyWordCount');
    const readonlyCopyBtn = document.getElementById('readonlyCopyBtn');
    const folderToggleBtn = document.getElementById('folderToggleBtn');
    const folderToggleText = folderToggleBtn.querySelector('.folder-toggle-text');
    const folderToggleArrow = folderToggleBtn.querySelector('.folder-toggle-arrow');
    let readModeActive = false;
    let readModeThoughtId = null;

    function collapseFolders() {
      if (window.innerWidth <= 640 && folderListEl.classList.contains('folder-list--open')) {
        folderListEl.classList.remove('folder-list--open');
        folderToggleArrow.classList.remove('folder-toggle-arrow--rotated');
      }
    }

    function calculateWordCount(text) {
      if (!text) return 0;
      const cleanText = text.trim();
      return cleanText ? cleanText.split(/\s+/).length : 0;
    }

    // ── Read-Only Mode ──
    function enterReadMode(id, body, tag) {
      readModeActive = true;
      readModeThoughtId = id;
      pageReadonlyBody.innerHTML = renderFullMarkdown(body);

      const wordCount = calculateWordCount(body);
      readonlyWordCount.textContent = wordCount === 1 ? '1 word' : `${wordCount} words`;

      pageReadonlyBody.hidden = false;
      pageReadonly.hidden = false;
      thoughtInput.hidden = true;
      tagInput.hidden = true;
      pageSaveGroup.hidden = true;
      saveStatus.hidden = true;
      collapseFolders();
    }

    function exitReadMode() {
      if (!readModeActive) return;
      readModeActive = false;
      readModeThoughtId = null;
      pageReadonly.hidden = true;
      pageReadonlyBody.hidden = true;
      thoughtInput.hidden = false;
      tagInput.hidden = false;
      pageSaveGroup.hidden = false;
      cancelBtn.hidden = true;
      saveStatus.hidden = false;
      thoughtInput.value = '';
      tagInput.value = '';
      adjustScrollAndHeight(false);
    }

    // ── Markdown Rendering (display only, never modifies stored data) ──
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function stripBlockMarkers(text) {
      return text
        .split('\n')
        .map(line => {
          if (line.startsWith('# ')) line = line.slice(2);
          if (line.startsWith('- ')) line = line.slice(2);
          return line;
        })
        .join('\n');
    }

    function renderInlineMarkdown(text) {
      return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }

    function renderFullMarkdown(text) {
      const lines = text.split('\n');
      const result = [];
      let inList = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (line.trim() === '') {
          if (inList) { result.push('</ul>'); inList = false; }
          result.push('');
          continue;
        }
        if (line.startsWith('# ')) {
          if (inList) { result.push('</ul>'); inList = false; }
          const content = escapeHtml(line.slice(2)).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          result.push('<h2>' + content + '</h2>');
        } else if (line.startsWith('- ')) {
          if (!inList) { result.push('<ul>'); inList = true; }
          const content = escapeHtml(line.slice(2)).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          result.push('<li>' + content + '</li>');
        } else {
          if (inList) { result.push('</ul>'); inList = false; }
          const content = escapeHtml(line).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          result.push('<p>' + content + '</p>');
        }
      }
      if (inList) result.push('</ul>');
      return result.join('\n');
    }

    // ── Caret Tracking & Auto-Grow Helpers ──
    let lastCaretY = 0;

    function adjustScrollAndHeight(shouldScroll = true) {
      const textarea = thoughtInput;
      const val = textarea.value;

      let mirror = document.getElementById('textarea-mirror');
      if (!mirror) {
        mirror = document.createElement('div');
        mirror.id = 'textarea-mirror';
        mirror.style.position = 'absolute';
        mirror.style.visibility = 'hidden';
        mirror.style.top = '0';
        mirror.style.left = '-9999px';
        mirror.style.height = 'auto';
        mirror.style.overflow = 'hidden';
        mirror.style.whiteSpace = 'pre-wrap';
        mirror.style.wordBreak = 'break-word';
        mirror.style.overflowWrap = 'break-word';

        const style = window.getComputedStyle(textarea);
        const properties = [
          'fontFamily', 'fontSize', 'fontWeight', 'lineHeight',
          'paddingTop', 'paddingBottom', 'paddingLeft', 'paddingRight',
          'borderWidth', 'borderStyle', 'boxSizing'
        ];
        properties.forEach(prop => {
          mirror.style[prop] = style[prop];
        });
        document.body.appendChild(mirror);
      }

      // Sync width
      mirror.style.width = window.getComputedStyle(textarea).width;
      
      // Calculate true height from full content
      mirror.textContent = val;
      const trueHeight = mirror.scrollHeight;
      const targetHeight = Math.max(160, trueHeight);

      // Only set height if it actually changed to allow uninterrupted CSS transition
      const currentHeight = parseFloat(textarea.style.height) || textarea.offsetHeight;
      if (Math.abs(currentHeight - targetHeight) > 1) {
        textarea.style.height = targetHeight + 'px';
      }

      // Calculate relative caret Y offset using the same mirror
      const selStart = textarea.selectionStart;
      mirror.textContent = val.slice(0, selStart);
      const marker = document.createElement('span');
      marker.textContent = '|';
      mirror.appendChild(marker);
      const caretY = marker.offsetTop;

      // Smooth scroll adjustment
      if (shouldScroll && caretY > lastCaretY) {
        const textareaRect = textarea.getBoundingClientRect();
        const caretScreenY = textareaRect.top + caretY;
        const targetY = window.innerHeight * 0.45;

        if (caretScreenY > targetY) {
          window.scrollBy({
            top: caretScreenY - targetY,
            behavior: 'smooth'
          });
        }
      }

      lastCaretY = caretY;

      // Update live word count in editor
      const count = calculateWordCount(val);
      editorWordCount.textContent = count === 1 ? '1 word' : `${count} words`;
    }

    // ── Helpers ──
    function formatFullMonthDate(ts) {
      return new Date(ts).toLocaleDateString('en-US', {
        month: 'long',
        day: 'numeric'
      });
    }

    function formatShortDate(ts) {
      const d = new Date(ts);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[d.getMonth()]} ${d.getDate()}`;
    }

    function truncate(str, len) {
      if (str.length <= len) return str;
      return str.slice(0, len).trimEnd() + '\u2026';
    }

    function formatTimeShort(ts) {
      return new Date(ts).toLocaleTimeString('en-US', {
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).toLowerCase().replace(' ', '');
    }

    function setTimestamp() {
      const now = new Date();
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      timestamp.textContent = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
      timestamp.setAttribute('datetime', now.toISOString().slice(0, 10));
    }

    function getFolderName(id) {
      if (!id) return null;
      const f = folders.find(x => x.id === id);
      return f ? f.name : null;
    }

    // ── Folder List ──
    function renderFolderList(highlightId = null) {
      folderListEl.innerHTML = '';

      // Update search placeholder to show thought count dynamically
      searchInput.placeholder = 'search your thoughts (' + thoughts.length + ')';

      // Folder rows
      folders.forEach(folder => {
        const count = thoughts.filter(t => t.folderId === folder.id).length;
        const row = document.createElement('button');
        row.className = 'folder-row';
        if (currentView === folder.id) row.classList.add('folder-row--active');
        row.dataset.folderId = folder.id;
        if (highlightId === folder.id) row.classList.add('folder-row--dropped');
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'folder-row-name';
        nameSpan.textContent = folder.name;
        
        const countSpan = document.createElement('span');
        countSpan.className = 'folder-row-count';
        countSpan.textContent = count;
        if (highlightId === folder.id) {
          countSpan.classList.add('folder-row-count--pop');
          setTimeout(() => countSpan.classList.remove('folder-row-count--pop'), 300);
        }
        row.appendChild(nameSpan);
        row.appendChild(countSpan);

        // Menu button
        const menuWrapper = document.createElement('div');
        menuWrapper.className = 'folder-row-menu';
        const menuBtn = document.createElement('button');
        menuBtn.className = 'folder-row-menu-btn';
        menuBtn.textContent = '\u2026';
        menuBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleFolderMenu(menuWrapper, folder);
        });
        menuWrapper.appendChild(menuBtn);
        row.appendChild(menuWrapper);

        row.addEventListener('click', () => selectFolder(folder.id));
        // Drop target
        row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('folder-row--drag-over'); });
        row.addEventListener('dragleave', () => row.classList.remove('folder-row--drag-over'));
        row.addEventListener('drop', (e) => {
          e.preventDefault();
          row.classList.remove('folder-row--drag-over');
          const thoughtId = e.dataTransfer.getData('text/plain');
          if (thoughtId) moveThoughtToFolder(thoughtId, folder.id);
        });
        folderListEl.appendChild(row);
      });

      // "+ New folder" row
      const addRow = document.createElement('button');
      addRow.className = 'folder-add-row';
      addRow.textContent = '+ New folder';
      const addInput = document.createElement('input');
      addInput.type = 'text';
      addInput.className = 'folder-add-input';
      addInput.placeholder = 'folder name';
      addInput.maxLength = 30;
      addInput.hidden = true;
      addRow.addEventListener('click', () => {
        addRow.hidden = true;
        addInput.hidden = false;
        addInput.value = '';
        addInput.focus();
      });
      addInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const name = addInput.value.trim();
          if (name) {
            createFolder(name);
            addInput.hidden = true;
            addRow.hidden = false;
          }
        } else if (e.key === 'Escape') {
          addInput.hidden = true;
          addRow.hidden = false;
        }
      });
      addInput.addEventListener('blur', () => {
        addInput.hidden = true;
        addRow.hidden = false;
      });
      folderListEl.appendChild(addRow);
      folderListEl.appendChild(addInput);
    }

    function selectFolder(folderId) {
      if (currentView === folderId) {
        currentView = 'list';
      } else {
        currentView = folderId;
      }
      renderFolderList();
      renderEntries();
    }

    function toggleFolderMenu(wrapper, folder) {
      // Close any other open menus
      document.querySelectorAll('.folder-row-dropdown[open]').forEach(el => {
        if (el !== wrapper.querySelector('.folder-row-dropdown')) {
          el.removeAttribute('open');
          el.remove();
        }
      });

      let dropdown = wrapper.querySelector('.folder-row-dropdown');
      if (dropdown && dropdown.hasAttribute('open')) {
        dropdown.removeAttribute('open');
        dropdown.style.position = '';
        dropdown.style.top = '';
        dropdown.style.left = '';
        return;
      }

      if (!dropdown) {
        dropdown = document.createElement('div');
        dropdown.className = 'folder-row-dropdown';

        const renameItem = document.createElement('button');
        renameItem.className = 'folder-row-dropdown-item';
        renameItem.textContent = 'Rename';
        renameItem.addEventListener('click', (e) => {
          e.stopPropagation();
          dropdown.removeAttribute('open');
          dropdown.style.position = '';
          dropdown.style.top = '';
          dropdown.style.left = '';
          startInlineRename(folder, wrapper.closest('.folder-row'));
        });
        dropdown.appendChild(renameItem);

        const deleteItem = document.createElement('button');
        deleteItem.className = 'folder-row-dropdown-item folder-row-dropdown-item--danger';
        deleteItem.textContent = 'Delete';
        deleteItem.addEventListener('click', (e) => {
          e.stopPropagation();
          dropdown.removeAttribute('open');
          dropdown.style.position = '';
          dropdown.style.top = '';
          dropdown.style.left = '';
          startInlineDelete(folder, wrapper.closest('.folder-row'));
        });
        dropdown.appendChild(deleteItem);

        wrapper.appendChild(dropdown);
      }

      dropdown.setAttribute('open', '');

      // Position dropdown using the tapped button's bounding rect
      const btn = wrapper.querySelector('.folder-row-menu-btn');
      if (btn) {
        const btnRect = btn.getBoundingClientRect();
        const dropWidth = dropdown.offsetWidth;
        let left = btnRect.left + btnRect.width / 2 - dropWidth / 2;
        left = Math.max(8, Math.min(left, window.innerWidth - dropWidth - 8));
        dropdown.style.position = 'fixed';
        dropdown.style.top = (btnRect.bottom + 4) + 'px';
        dropdown.style.left = left + 'px';
      }

      // Close on click outside
      const closeHandler = (e) => {
        if (!wrapper.contains(e.target)) {
          dropdown.removeAttribute('open');
          dropdown.style.position = '';
          dropdown.style.top = '';
          dropdown.style.left = '';
          document.removeEventListener('click', closeHandler);
        }
      };
      setTimeout(() => document.addEventListener('click', closeHandler), 0);
    }

    function startInlineRename(folder, rowEl) {
      const nameSpan = rowEl.querySelector('.folder-row-name');
      const currentName = folder.name;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'folder-add-input';
      input.value = currentName;
      input.maxLength = 30;

      let saved = false;
      const save = async () => {
        if (saved) return;
        const newName = input.value.trim();
        if (newName && newName !== currentName) {
          saved = true;
          folder.name = newName;
          await saveEncryptedLocally();
          renderFolderList();
          renderEntries();
          setPendingSync(true);
          syncToGitHub();
        } else {
          renderFolderList();
        }
      };

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        else if (e.key === 'Escape') { saved = true; renderFolderList(); }
      });
      input.addEventListener('blur', save);

      nameSpan.replaceWith(input);
      input.focus();
      input.select();
    }

    function startInlineDelete(folder, rowEl) {
      rowEl.innerHTML = '';

      const msg = document.createElement('span');
      msg.className = 'folder-row-name';
      msg.textContent = 'Delete ' + folder.name + '?';
      rowEl.appendChild(msg);

      const confirm = document.createElement('div');
      confirm.className = 'folder-detail-delete-confirm';

      const yesBtn = document.createElement('button');
      yesBtn.className = 'confirm-yes';
      yesBtn.textContent = 'yes';
      yesBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteFolder(folder);
      });

      const noBtn = document.createElement('button');
      noBtn.className = 'confirm-no';
      noBtn.textContent = 'no';
      noBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        renderFolderList();
      });

      confirm.appendChild(yesBtn);
      confirm.appendChild(noBtn);
      rowEl.appendChild(confirm);
    }

    // ── Folder CRUD (local-first) ──
    async function createFolder(name) {
      const folder = { id: crypto.randomUUID(), name, createdAt: Date.now() };
      folders.push(folder);
      console.log('[Space] Folder created:', name, folder.id);
      await saveEncryptedLocally();
      renderFolderList();
      renderEntries();
      setPendingSync(true);
      syncToGitHub();
    }

    async function deleteFolder(folder) {
      thoughts.forEach(t => { if (t.folderId === folder.id) t.folderId = null; });
      folders = folders.filter(f => f.id !== folder.id);
      console.log('[Space] Folder deleted:', folder.name);
      currentView = 'list';
      await saveEncryptedLocally();
      renderFolderList();
      renderEntries();
      setPendingSync(true);
      syncToGitHub();
    }

    async function moveThoughtToFolder(thoughtId, folderId) {
      const t = thoughts.find(x => x.id === thoughtId);
      if (!t) return;

      const card = document.querySelector(`.entry[data-id="${thoughtId}"]`);
      if (card) {
        card.classList.add('entry--transferring');
      }

      setTimeout(async () => {
        t.folderId = folderId;
        t.updatedAt = Date.now();
        const folderName = getFolderName(folderId);
        console.log('[Space] Moved thought', thoughtId, 'to', folderName || '(unfiled)');
        await saveEncryptedLocally();
        renderFolderList(folderId || '__all__');
        renderEntries();
        setPendingSync(true);
        syncToGitHub();
      }, 250);
    }

    // ── Persist to GitHub (kept for compatibility, now non-blocking) ──
    async function persistToGitHub() {
      // This function is now handled by syncToGitHub() in the background
      // It's kept as a no-op for any stale callers
      return true;
    }

    // Hide revealed Edit/Delete buttons when clicking outside entries
    document.addEventListener('pointerdown', (e) => {
      if (!e.target.closest('.entry')) {
        document.querySelectorAll('.entry-actions:not([hidden])').forEach(el => el.hidden = true);
        document.querySelectorAll('.entry-delete-confirm:not([hidden])').forEach(el => el.hidden = true);
      }
    });

    // ── Render Entries ──
    function renderEntries() {
      entriesEl.innerHTML = '';

      const filtered = thoughts.filter(t => {
        if (currentView !== 'list' && t.folderId !== currentView) return false;
        return true;
      });

      if (filtered.length === 0 && thoughts.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<p>nothing here yet \u2014 your first thought will start the list.</p>';
        entriesEl.appendChild(empty);
        return;
      }

      if (filtered.length === 0 && currentView !== 'list') {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<p>no thoughts in this folder yet.</p>';
        entriesEl.appendChild(empty);
        return;
      }

      const sorted = [...filtered].sort((a, b) => b.createdAt - a.createdAt);

      sorted.forEach(t => {
        const article = createEntryElement(t);
        entriesEl.appendChild(article);
      });

      applyFilter();
    }

    function createEntryElement(t) {
      const article = document.createElement('article');
      article.className = 'entry';
      article.dataset.id = t.id;
      article.draggable = true;

      // Drag handlers
      article.addEventListener('dragstart', (e) => {
        draggedThoughtId = t.id;
        article.classList.add('entry--dragging');
        e.dataTransfer.setData('text/plain', t.id);
        e.dataTransfer.effectAllowed = 'move';
      });
      article.addEventListener('dragend', () => {
        article.classList.remove('entry--dragging');
        draggedThoughtId = null;
        document.querySelectorAll('.folder-row--drag-over').forEach(el => el.classList.remove('folder-row--drag-over'));
      });

      const row = document.createElement('div');
      row.className = 'entry-row';
      row.setAttribute('role', 'button');
      row.setAttribute('tabindex', '0');

      // Column 1: Date & Time
      const dateTimeCol = document.createElement('div');
      dateTimeCol.className = 'entry-date-time-col';

      const dateEl = document.createElement('time');
      dateEl.className = 'entry-date';
      dateEl.setAttribute('datetime', new Date(t.createdAt).toISOString());
      dateEl.textContent = formatFullMonthDate(t.createdAt);
      dateTimeCol.appendChild(dateEl);

      const timeEl = document.createElement('div');
      timeEl.className = 'entry-time';
      timeEl.textContent = formatTimeShort(t.createdAt);
      dateTimeCol.appendChild(timeEl);

      row.appendChild(dateTimeCol);

      // Column 2: Group & Tag
      const metaCol = document.createElement('div');
      metaCol.className = 'entry-meta-col';

      const hasFolder = t.folderId && getFolderName(t.folderId);
      if (hasFolder) {
        const folderEl = document.createElement('span');
        folderEl.className = 'entry-folder';
        folderEl.textContent = getFolderName(t.folderId);
        metaCol.appendChild(folderEl);
      } else {
        const placeholder = document.createElement('span');
        placeholder.className = 'entry-meta-placeholder';
        placeholder.innerHTML = '&nbsp;';
        metaCol.appendChild(placeholder);
      }

      const hasTag = t.tag;
      if (hasTag) {
        const tagEl = document.createElement('span');
        tagEl.className = 'entry-tag';
        tagEl.textContent = t.tag;
        metaCol.appendChild(tagEl);
      } else {
        const placeholder = document.createElement('span');
        placeholder.className = 'entry-meta-placeholder';
        placeholder.innerHTML = '&nbsp;';
        metaCol.appendChild(placeholder);
      }

      row.appendChild(metaCol);

      // Column 3: Excerpt (Body)
      const bodyCol = document.createElement('div');
      bodyCol.className = 'entry-body-col';

      const excerpt = document.createElement('p');
      excerpt.className = 'entry-excerpt';
      excerpt.innerHTML = renderInlineMarkdown(truncate(stripBlockMarkers(t.body), 70));
      bodyCol.appendChild(excerpt);

      row.appendChild(bodyCol);

      // Edit + Delete buttons (hidden by default)
      const actions = document.createElement('div');
      actions.className = 'entry-actions';
      actions.hidden = true;

      const editBtn = document.createElement('button');
      editBtn.className = 'entry-action-btn';
      editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        startEdit(t.id);
      });

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'entry-action-btn entry-action-btn--danger';
      deleteBtn.textContent = 'Delete';
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        actions.hidden = true;
        confirm.hidden = false;
      });

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);

      const confirm = document.createElement('div');
      confirm.className = 'entry-delete-confirm';
      confirm.hidden = true;
      confirm.innerHTML = '<span>are you sure?</span>';
      const yesBtn = document.createElement('button');
      yesBtn.className = 'confirm-yes';
      yesBtn.textContent = 'yes';
      yesBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteThought(t.id);
      });
      const noBtn = document.createElement('button');
      noBtn.className = 'confirm-no';
      noBtn.textContent = 'no';
      noBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        confirm.hidden = true;
        actions.hidden = false;
      });
      confirm.appendChild(yesBtn);
      confirm.appendChild(noBtn);

      article.appendChild(row);
      article.appendChild(actions);
      article.appendChild(confirm);

      // ── Short click / Long press detection ──
      let pressTimer = null;
      let longPressed = false;
      let startX = 0;
      let startY = 0;
      const LONG_PRESS_MS = 750;
      const MOVE_THRESHOLD = 8;

      function clearPress() {
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
        row.classList.remove('entry--pressing');
      }

      row.addEventListener('pointerdown', (e) => {
        if (e.button && e.button !== 0) return; // only primary button
        if (draggedThoughtId) return;
        longPressed = false;
        startX = e.clientX;
        startY = e.clientY;
        row.classList.add('entry--pressing');
        pressTimer = setTimeout(() => {
          longPressed = true;
          pressTimer = null;
          row.classList.remove('entry--pressing');
          // Reveal Edit/Delete, hide any other revealed row
          document.querySelectorAll('.entry-actions:not([hidden])').forEach(el => el.hidden = true);
          document.querySelectorAll('.entry-delete-confirm:not([hidden])').forEach(el => el.hidden = true);
          actions.hidden = false;
          confirm.hidden = true;
        }, LONG_PRESS_MS);
      });

      row.addEventListener('pointermove', (e) => {
        if (!pressTimer) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) {
          clearPress();
        }
      });

      row.addEventListener('pointerup', (e) => {
        if (longPressed) {
          longPressed = false;
          return; // already handled by long press
        }
        if (pressTimer) {
          clearPress();
          enterReadMode(t.id, t.body, t.tag);
          page.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });

      row.addEventListener('pointercancel', () => { clearPress(); longPressed = false; });
      row.addEventListener('pointerleave', () => { clearPress(); longPressed = false; });

      return article;
    }

    // ── Filter ──
    function applyFilter() {
      const query = searchInput.value.toLowerCase().trim();
      const entries = entriesEl.querySelectorAll('.entry');
      let visibleCount = 0;

      entries.forEach(article => {
        const id = article.dataset.id;
        const t = thoughts.find(x => x.id === id);
        if (!t) return;

        const matches = !query ||
          t.body.toLowerCase().includes(query) ||
          (t.tag && t.tag.toLowerCase().includes(query));

        if (matches) {
          article.classList.remove('entry--hidden');
          visibleCount++;
        } else {
          article.classList.add('entry--hidden');
        }
      });

      const existingEmpty = entriesEl.querySelector('.empty-state');
      if (visibleCount === 0 && thoughts.length > 0) {
        if (!existingEmpty) {
          const empty = document.createElement('div');
          empty.className = 'empty-state';
          empty.innerHTML = '<p>no matching thoughts found.</p>';
          entriesEl.appendChild(empty);
        }
      } else if (existingEmpty && thoughts.length > 0) {
        existingEmpty.remove();
      }
    }

    // ── Edit ──
    function startEdit(id) {
      const t = thoughts.find(x => x.id === id);
      if (!t) return;
      if (readModeActive) exitReadMode();
      editingId = id;
      thoughtInput.value = t.body;
      tagInput.value = t.tag || '';
      saveBtn.textContent = 'Update thought';
      cancelBtn.hidden = false;
      thoughtInput.focus();
      adjustScrollAndHeight(false);
      collapseFolders();
      page.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── Delete ──
    async function deleteThought(id) {
      if (id === readModeThoughtId) exitReadMode();
      thoughts = thoughts.filter(t => t.id !== id);
      editingId = null;
      saveBtn.textContent = 'Save thought';
      cancelBtn.hidden = true;
      await saveEncryptedLocally();
      renderFolderList();
      renderEntries();
      setPendingSync(true);
      syncToGitHub();
    }

    // ── Save / Update (local-first) ──
    saveBtn.addEventListener('click', async () => {
      const body = thoughtInput.value.trim();
      if (!body) return;

      const tag = tagInput.value.trim() || null;

      if (editingId) {
        // Editing existing thought
        const t = thoughts.find(x => x.id === editingId);
        if (!t) return;
        t.body = body;
        t.tag = tag;
        t.updatedAt = Date.now();
        editingId = null;
        saveBtn.textContent = 'Save thought';
        cancelBtn.hidden = true;

        // Save locally first, update UI immediately
        await saveEncryptedLocally();
        renderFolderList();
        renderEntries();
        thoughtInput.value = '';
        tagInput.value = '';
        adjustScrollAndHeight(false);
        triggerPulse();

        // Background sync to GitHub
        setPendingSync(true);
        syncToGitHub();
      } else {
        // New thought
        const newThought = {
          id: crypto.randomUUID(),
          createdAt: Date.now(),
          updatedAt: Date.now(),
          tag,
          body,
          folderId: currentView !== 'list' ? currentView : null
        };
        thoughts.push(newThought);

        // Save locally first, update UI immediately
        await saveEncryptedLocally();
        renderFolderList();
        renderEntries();
        thoughtInput.value = '';
        tagInput.value = '';
        adjustScrollAndHeight(false);
        triggerPulse();

        // Background sync to GitHub
        setPendingSync(true);
        syncToGitHub();
      }
    });

    cancelBtn.addEventListener('click', () => {
      editingId = null;
      saveBtn.textContent = 'Save thought';
      cancelBtn.hidden = true;
      thoughtInput.value = '';
      tagInput.value = '';
      adjustScrollAndHeight(false);
    });

    // ── Search ──
    searchInput.addEventListener('input', () => {
      const query = searchInput.value.toLowerCase().trim();
      if (query && currentView !== 'list') {
        currentView = 'list';
        renderFolderList();
        renderEntries();
      }
      applyFilter();
    });

    // ── Click to Close Read-Only View ──
    pageReadonly.addEventListener('click', exitReadMode);

    // ── Copy Thought in Read-Only View ──
    readonlyCopyBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const currentThought = thoughts.find(x => x.id === readModeThoughtId);
      if (currentThought) {
        navigator.clipboard.writeText(currentThought.body).then(() => {
          const origHTML = readonlyCopyBtn.innerHTML;
          readonlyCopyBtn.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--lichen)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 1rem; height: 1rem;">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          `;
          setTimeout(() => {
            readonlyCopyBtn.innerHTML = origHTML;
          }, 1500);
        }).catch(err => {
          console.warn('[Space] Failed to copy text:', err);
        });
      }
    });

    // ── Folder Collapse/Expand Toggle ──
    folderToggleBtn.addEventListener('click', () => {
      const isOpen = folderListEl.classList.toggle('folder-list--open');
      folderToggleArrow.classList.toggle('folder-toggle-arrow--rotated', isOpen);
      if (!isOpen && currentView !== 'list') {
        currentView = 'list';
        renderFolderList();
        renderEntries();
      }
    });

    // ── Dragstart Auto-Expand folders ──
    document.addEventListener('dragstart', (e) => {
      const entry = e.target.closest('.entry');
      if (entry) {
        if (window.innerWidth <= 640 && !folderListEl.classList.contains('folder-list--open')) {
          folderListEl.classList.add('folder-list--open');
          folderToggleArrow.classList.add('folder-toggle-arrow--rotated');
        }
      }
    });

    // ── Caret / Resize Listeners ──
    thoughtInput.addEventListener('input', () => adjustScrollAndHeight(true));
    thoughtInput.addEventListener('keyup', () => adjustScrollAndHeight(false));
    thoughtInput.addEventListener('click', () => adjustScrollAndHeight(false));
    thoughtInput.addEventListener('focus', () => adjustScrollAndHeight(false));

    // ── Online event: sync pending changes ──
    window.addEventListener('online', () => {
      console.log('[Space] Back online — syncing pending changes');
      syncToGitHub();
    });

    // ── Service Worker Registration ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(reg => {
        console.log('[Space] Service worker registered, scope:', reg.scope);
      }).catch(err => {
        console.warn('[Space] Service worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
